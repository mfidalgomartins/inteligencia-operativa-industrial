[pytest]
pythonpath = .
markers =
    blocker: Test bloqueante de release (fallo = no publish).
    critical: Test crítico de confiabilidad analítica.
    high: Test de alta prioridad para calidad decisional.
    warning: Test informativo/no bloqueante.
    quick: Subconjunto rápido para PR.
    full: Suite completa para release candidate.
